const root=document.getElementById('root'); const baht=n=>(+n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); const thaiDate=d=>new Date(d).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}); function save(){localStorage.spsRTAFNC=JSON.stringify(S)} function go(v){S.view=v;save();render()} function toast(t){const x=document.getElementById('toast');x.textContent=t;x.classList.remove('hide');setTimeout(()=>x.classList.add('hide'),2200)} function filtered(){return S.docs.filter(d=>(S.q===''||[d.number,d.subject,d.group,d.vendor].join(' ').toLowerCase().includes(S.q.toLowerCase()))&&(S.type==='all'||d.type===S.type)&&(S.status==='all'||d.status===S.status))}

function loginPage(){root.innerHTML=`<section class="login"><div class="loginBox"><div class="brand"><div class="icon">🛒</div><h1>ระบบจัดซื้อจัดจ้าง วิธีเฉพาะเจาะจง <span>บริหารงานพัสดุ ครบทุกมิติ</span></h1><p>ต้นแบบ Web App สำหรับ วพอ. รองรับใบขอซื้อ/ขอจ้าง รายงานราชการ การพิมพ์ PDF และ Workflow สถานะงาน</p><div class="features"><div><b>🛒</b><span><strong>จัดซื้อจัดจ้างครบวงจร</strong><br><small>ตั้งแต่ขอซื้อจนตรวจรับ</small></span></div><div><b>🖨️</b><span><strong>พิมพ์เอกสารราชการ</strong><br><small>รายงานขอซื้อ/ขอจ้าง และรายงานสรุป</small></span></div><div><b>🛡️</b><span><strong>ถูกต้องตามระเบียบ</strong><br><small>ออกแบบเพื่อ Flow งานวิธีเฉพาะเจาะจง</small></span></div><div><b>📱</b><span><strong>ใช้งานได้ทุกอุปกรณ์</strong><br><small>มือถือ แท็บเล็ต คอมพิวเตอร์</small></span></div></div></div><div class="signin"><h2>ยินดีต้อนรับกลับ</h2><p>เข้าสู่ระบบเพื่อจัดการงานจัดซื้อจัดจ้าง</p><div class="field"><label>ชื่อผู้ใช้</label><input id="u" placeholder="admin"></div><div class="field"><label>รหัสผ่าน</label><input id="p" type="password" placeholder="123456"></div><button class="loginBtn" onclick="tryLogin()">เข้าสู่ระบบ</button><div class="demo"><b>ทดลองใช้งานด้วยบัญชีตัวอย่าง</b><div class="demoGrid">${Object.keys(roles).map(r=>`<button onclick="login('${r}')"><span>${roles[r][2]}</span><br>${roles[r][1]}<small>${r}</small></button>`).join('')}</div><small>รหัสผ่านทุกบัญชี: 123456</small></div></div></div></section>`}
function tryLogin(){let u=document.getElementById('u').value.trim()||'admin',p=document.getElementById('p').value.trim(); if(roles[u]&&p==='123456')login(u); else toast('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง')}
function shell(content){const r=roles[S.user]; root.innerHTML=`<div class="app"><aside id="side" class="side"><div class="logo"><div class="icon">🛒</div><div><b>SPS-RTAFNC</b><br><small>${S.org}</small></div></div><div class="time"><div id="clock" class="clock"></div><div class="muted">วันที่ ${new Date().toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div><div class="user"><div class="avatar">${S.user[0].toUpperCase()}</div><div><b>${r[0]}</b><br><span class="role">${r[1]}</span></div></div><div class="sec">ภาพรวม</div>${nav('dashboard','📊','แดชบอร์ด')}<div class="sec">งานหลัก</div>${nav('requests','📄','ใบขอซื้อ/ขอจ้าง')}${nav('create','➕','สร้างเอกสารใหม่')}<div class="sec">ข้อมูลหลัก</div>${nav('vendors','🏢','ผู้ขาย/ผู้รับจ้าง')}<div class="sec">รายงานและประวัติ</div>${nav('reports','📈','รายงานสรุป')}${nav('logs','🕓','ประวัติการใช้งาน')}<div class="sec">ระบบ</div>${nav('settings','⚙️','ตั้งค่าระบบ')}<button class="nav out" onclick="logout()">↪ ออกจากระบบ</button></aside><main class="main"><header class="top"><div class="title"><button class="btn mobile" onclick="document.getElementById('side').classList.toggle('open')">☰</button><i>${icon(S.view)}</i><div><h2>${title(S.view)}</h2><small>${sub(S.view)}</small></div></div><div class="rightTop"><span class="online">ออนไลน์</span><span class="chip">${r[0]} ▾</span></div></header><div class="content">${content}</div></main></div>`; tick(); setInterval(tick,1000)}
function nav(v,i,t){return `<button class="nav ${S.view===v?'on':''}" onclick="go('${v}')"><span>${i}</span>${t}</button>`} function icon(v){return {dashboard:'📊',requests:'📄',create:'➕',vendors:'🏢',reports:'📈',logs:'🕓',settings:'⚙️'}[v]||'📄'} function title(v){return {dashboard:'แดชบอร์ด',requests:'ใบขอซื้อ/ขอจ้าง',create:'สร้างเอกสารใหม่',vendors:'ผู้ขาย/ผู้รับจ้าง',reports:'รายงานสรุป',logs:'ประวัติการใช้งาน',settings:'ตั้งค่าระบบ'}[v]} function sub(v){return {dashboard:'ภาพรวมงานจัดซื้อจัดจ้าง',requests:'จัดการเอกสารจัดซื้อจัดจ้าง วิธีเฉพาะเจาะจง',create:'บันทึกคำขอซื้อ/ขอจ้างใหม่',vendors:'จัดการข้อมูลผู้ขายและผู้รับจ้าง',reports:'สรุปรายการ พร้อมพิมพ์/ส่งออก',logs:'บันทึกเหตุการณ์ในระบบ',settings:'ข้อมูลหน่วยงานและปีงบประมาณ'}[v]||''} function tick(){let c=document.getElementById('clock'); if(c)c.textContent=new Date().toLocaleTimeString('th-TH')}
function dashboard(){let total=S.docs.reduce((a,d)=>a+d.amount,0),pending=S.docs.filter(d=>!['complete','cancel'].includes(d.status)).length; shell(`<div class="hero"><b>ระบบจัดซื้อจัดจ้าง</b><h1>บริหารงานพัสดุ วิธีเฉพาะเจาะจง</h1><p>ติดตามเอกสาร วงเงิน สถานะ และพิมพ์เอกสารราชการในหน้าเดียว</p></div><div class="stats"><div class="stat"><small>จำนวนเอกสาร</small><strong>${S.docs.length}</strong></div><div class="stat"><small>มูลค่ารวม</small><strong>${baht(total)}</strong></div><div class="stat"><small>กำลังดำเนินการ</small><strong>${pending}</strong></div><div class="stat"><small>เสร็จสมบูรณ์</small><strong>${S.docs.filter(d=>d.status==='complete').length}</strong></div></div><div class="grid2"><div class="panel"><h3>เอกสารล่าสุด</h3>${cards(S.docs.slice(0,6))}</div><div class="panel"><h3>สถานะงาน</h3>${Object.keys(labels).map(k=>`<p><span class="status ${k}">${labels[k]}</span> <b>${S.docs.filter(d=>d.status===k).length}</b> รายการ</p>`).join('')}</div></div>`)}
function cards(list){return `<div class="cards">${list.map(d=>`<div class="card ${d.type==='hire'?'hire':''}" onclick="detail('${d.id}')"><div class="head"><span>${d.number}</span><span class="type">${d.type==='buy'?'จัดซื้อ':'จัดจ้าง'}</span></div><h3>${d.subject}</h3><div class="meta"><span>▣ ${d.group}</span><span>☷ ${d.items.length} รายการ</span><span>♙ ${d.owner}</span></div><div class="amount">${baht(d.amount)} <small>บาท</small></div><div class="bottom"><span class="status ${d.status}">${labels[d.status]}</span><small>${thaiDate(d.date)}</small></div></div>`).join('')}</div>`}
function requests(){let list=filtered(); shell(`<div class="hero"><b>งานจัดซื้อจัดจ้าง</b><h1>ใบขอซื้อ/ขอจ้าง</h1><p>ค้นหา กรองสถานะ และเปิดรายละเอียดเอกสาร</p></div><div class="toolbar"><input class="inp" placeholder="ค้นหาเลขที่ เรื่อง กลุ่มสาระ ผู้ขาย..." value="${S.q}" oninput="S.q=this.value;save();requests()"><select onchange="S.type=this.value;save();requests()"><option value="all">ทุกประเภท</option><option value="buy" ${S.type==='buy'?'selected':''}>จัดซื้อ</option><option value="hire" ${S.type==='hire'?'selected':''}>จัดจ้าง</option></select><select onchange="S.status=this.value;save();requests()"><option value="all">ทุกสถานะ</option>${Object.keys(labels).map(k=>`<option value="${k}" ${S.status===k?'selected':''}>${labels[k]}</option>`).join('')}</select><button class="btn primary" onclick="go('create')">+ สร้างเอกสาร</button></div><div class="tabs">${['all','draft','review','director','consider','order','inspected','complete'].map(k=>`<button class="tab ${S.status===k?'on':''}" onclick="S.status='${k}';save();requests()">${k==='all'?'ทั้งหมด':labels[k]}</button>`).join('')}</div>${S.mode==='card'?cards(list):table(list)}`)}
function table(list){return `<div class="table"><table><thead><tr><th>เลขที่</th><th>วันที่</th><th>เรื่อง</th><th>ประเภท</th><th>กลุ่มงาน</th><th>วงเงิน</th><th>สถานะ</th></tr></thead><tbody>${list.map(d=>`<tr onclick="detail('${d.id}')"><td>${d.number}</td><td>${thaiDate(d.date)}</td><td>${d.subject}</td><td>${d.type==='buy'?'จัดซื้อ':'จัดจ้าง'}</td><td>${d.group}</td><td>${baht(d.amount)}</td><td><span class="status ${d.status}">${labels[d.status]}</span></td></tr>`).join('')}</tbody></table></div>`}
function detail(id){let d=S.docs.find(x=>x.id===id); S.view='detail'; save(); shell(`<button class="btn" onclick="go('requests')">← กลับ</button><div class="hero"><b>${d.number}</b><h1>${d.subject}</h1><p>${d.group} · ${thaiDate(d.date)} · ${d.vendor}</p></div><div class="grid2"><div class="panel"><h3>รายละเอียดเอกสาร</h3><p><b>ประเภท:</b> ${d.type==='buy'?'จัดซื้อ':'จัดจ้าง'}</p><p><b>เหตุผลและความจำเป็น:</b> ${d.reason}</p><p><b>งบประมาณ:</b> ${d.budget}</p><p><b>กำหนดส่งมอบ:</b> ${d.days} วัน</p><h3>รายการพัสดุ</h3><div class="table"><table><thead><tr><th>รายการ</th><th>จำนวน</th><th>ราคา</th><th>รวม</th></tr></thead><tbody>${d.items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>${baht(i.price)}</td><td>${baht(i.qty*i.price)}</td></tr>`).join('')}</tbody></table></div></div><div class="panel"><h3>การดำเนินการ</h3><p><span class="status ${d.status}">${labels[d.status]}</span></p>${next[d.status]?`<button class="btn primary" onclick="advance('${d.id}')">เลื่อนไปขั้น: ${labels[next[d.status]]}</button>`:''}<button class="btn warn" onclick="printDoc('${d.id}','request')">พิมพ์รายงานขอซื้อ/จ้าง</button><button class="btn" onclick="printDoc('${d.id}','attach')">พิมพ์รายละเอียดแนบ</button><button class="btn" onclick="cloneDoc('${d.id}')">คัดลอกเอกสาร</button><button class="btn danger" onclick="removeDoc('${d.id}')">ลบเอกสาร</button></div></div>`)}
function advance(id){let d=S.docs.find(x=>x.id===id); d.status=next[d.status]; S.logs.unshift('เลื่อนสถานะ '+d.number+' เป็น '+labels[d.status]); save(); detail(id); toast('อัปเดตสถานะแล้ว')} function cloneDoc(id){let d=S.docs.find(x=>x.id===id), n=JSON.parse(JSON.stringify(d)); n.id='r'+Date.now(); n.number=d.number+'-copy'; n.status='draft'; S.docs.unshift(n); S.logs.unshift('คัดลอกเอกสาร '+d.number); save(); detail(n.id)} function removeDoc(id){if(!confirm('ยืนยันลบเอกสารนี้?'))return; S.docs=S.docs.filter(d=>d.id!==id); S.logs.unshift('ลบเอกสาร'); save(); go('requests')}
function create(){shell(`<div class="hero"><b>สร้างเอกสารใหม่</b><h1>ใบขอซื้อ/ขอจ้าง</h1><p>กรอกข้อมูลครั้งเดียว ระบบคำนวณวงเงินและสร้างเอกสารในรายการ</p></div><form class="panel" onsubmit="addDoc(event)"><div class="formGrid"><div class="field"><label>เลขที่</label><input name="number" value="พิเศษ/${S.docs.length+1}/2569" required></div><div class="field"><label>วันที่</label><input name="date" type="date" value="${new Date().toISOString().slice(0,10)}" required></div><div class="field full"><label>เรื่อง</label><input name="subject" placeholder="เช่น จัดซื้อวัสดุสำนักงาน" required></div><div class="field"><label>ประเภท</label><select name="type"><option value="buy">จัดซื้อ</option><option value="hire">จัดจ้าง</option></select></div><div class="field"><label>กลุ่มสาระ/งาน</label><input name="group" value="งานพัสดุ" required></div><div class="field"><label>ผู้ขาย/ผู้รับจ้าง</label><input name="vendor" value="ร้านตัวอย่าง" required></div><div class="field"><label>งบประมาณ</label><input name="budget" value="งบดำเนินงาน"></div><div class="field"><label>กำหนดส่งมอบภายในกี่วัน</label><input name="days" type="number" value="7"></div><div class="field full"><label>เหตุผลและความจำเป็น</label><textarea name="reason">เพื่อใช้ในการปฏิบัติราชการและสนับสนุนภารกิจของหน่วยงาน</textarea></div></div><h3>รายการพัสดุ</h3><div id="items" class="items"></div><button type="button" class="btn" onclick="addItem()">+ เพิ่มรายการ</button><button class="btn primary">บันทึกเอกสาร</button></form>`); addItem()}
function addItem(){let x=document.getElementById('items'); if(!x)return; x.insertAdjacentHTML('beforeend',`<div class="row"><input class="inp" name="itemName" placeholder="รายการ" required><input class="inp" name="qty" type="number" value="1" min="1"><input class="inp" name="price" type="number" value="0" min="0"><button class="btn danger" type="button" onclick="this.parentElement.remove()">×</button></div>`)}
function addDoc(e){e.preventDefault();let f=e.target, names=[...f.querySelectorAll('[name=itemName]')], qty=[...f.querySelectorAll('[name=qty]')], price=[...f.querySelectorAll('[name=price]')]; let items=names.map((n,i)=>({name:n.value,qty:+qty[i].value||1,price:+price[i].value||0})); let amount=items.reduce((a,i)=>a+i.qty*i.price,0); let d={id:'r'+Date.now(),number:f.number.value,date:f.date.value,subject:f.subject.value,type:f.type.value,group:f.group.value,vendor:f.vendor.value,budget:f.budget.value,days:+f.days.value||7,reason:f.reason.value,items,amount,status:'draft',owner:roles[S.user][0]}; S.docs.unshift(d); S.logs.unshift('สร้างเอกสาร '+d.number); save(); toast('บันทึกเอกสารแล้ว'); detail(d.id)}
function vendors(){shell(`<div class="hero"><b>ข้อมูลหลัก</b><h1>ผู้ขาย/ผู้รับจ้าง</h1><p>ฐานข้อมูลคู่ค้าเบื้องต้นสำหรับแนบเอกสาร</p></div><div class="vendors">${S.vendors.map(v=>`<div class="vendor"><h3>${v.name}</h3><p class="muted">${v.type}</p><p>เลขผู้เสียภาษี: ${v.tax}</p><p>โทร: ${v.phone}</p></div>`).join('')}</div>`)}
function reports(){let list=filtered(),total=list.reduce((a,d)=>a+d.amount,0); shell(`<div class="hero"><b>รายงาน</b><h1>รายงานสรุปการจัดซื้อจัดจ้าง</h1><p>สรุปรายการ พร้อมพิมพ์หรือส่งออก CSV</p></div><div class="stats"><div class="stat"><small>จำนวนเอกสาร</small><strong>${list.length}</strong></div><div class="stat"><small>มูลค่ารวม</small><strong>${baht(total)}</strong></div><div class="stat"><small>จัดซื้อ</small><strong>${list.filter(d=>d.type==='buy').length}</strong></div><div class="stat"><small>จัดจ้าง</small><strong>${list.filter(d=>d.type==='hire').length}</strong></div></div><p><button class="btn primary" onclick="printReport()">พิมพ์ / บันทึก PDF</button> <button class="btn" onclick="exportCSV()">Export CSV</button></p>${table(list)}`)}
function logs(){shell(`<div class="hero"><b>Audit log</b><h1>ประวัติการใช้งาน</h1><p>บันทึกเหตุการณ์หลักในระบบ</p></div><div class="panel">${S.logs.map(l=>`<p>🕓 ${l}</p>`).join('')}</div>`)}
function settings(){shell(`<div class="hero"><b>ตั้งค่าระบบ</b><h1>ข้อมูลหน่วยงาน</h1><p>แก้ไขข้อมูลที่ใช้บนเอกสารและรายงาน</p></div><div class="panel"><div class="formGrid"><div class="field"><label>ชื่อหน่วยงาน</label><input id="org" value="${S.org}"></div><div class="field"><label>โทรศัพท์</label><input id="phone" value="${S.phone}"></div><div class="field"><label>ปีงบประมาณ</label><input id="year" value="${S.year}"></div></div><button class="btn primary" onclick="S.org=document.getElementById('org').value;S.phone=document.getElementById('phone').value;S.year=document.getElementById('year').value;save();toast('บันทึกแล้ว');settings()">บันทึก</button><button class="btn danger" onclick="localStorage.removeItem('spsRTAFNC');location.reload()">รีเซ็ตข้อมูลตัวอย่าง</button></div>`)}
function printDoc(id,type){let d=S.docs.find(x=>x.id===id); let rows=d.items.map((i,n)=>`<tr><td>${n+1}</td><td>${i.name}</td><td>${i.qty}</td><td>${baht(i.price)}</td><td>${baht(i.qty*i.price)}</td></tr>`).join(''); let html=`<html><head><title>${d.number}</title><style>body{font-family:Sarabun,Arial,sans-serif;padding:38px;color:#111}h1{text-align:center;font-size:26px}.meta{line-height:1.9}.garuda{text-align:center;font-size:34px}table{width:100%;border-collapse:collapse;margin-top:16px}td,th{border:1px solid #111;padding:8px;vertical-align:top}.right{text-align:right}.sign{margin-top:45px;text-align:right}@media print{button{display:none}}</style></head><body><button onclick="print()">พิมพ์ / บันทึก PDF</button><div class="garuda">ตราครุฑ</div><h1>${type==='attach'?'รายละเอียดแนบ':'บันทึกข้อความ'}</h1><div class="meta"><b>ส่วนราชการ</b> ${S.org} โทร. ${S.phone}<br><b>ที่</b> ${d.number} <b>วันที่</b> ${thaiDate(d.date)}<br><b>เรื่อง</b> รายงานขอ${d.type==='buy'?'ซื้อ':'จ้าง'}${d.subject}<br><b>เรียน</b> ผู้อำนวยการ${S.org}</div><p>ด้วย ${d.group} มีความประสงค์ขอ${d.type==='buy'?'ซื้อ':'จ้าง'} ${d.subject} เพื่อ ${d.reason} โดยใช้งบประมาณ ${d.budget} วงเงิน ${baht(d.amount)} บาท</p><table><thead><tr><th>ลำดับ</th><th>รายการ</th><th>จำนวน</th><th>ราคาต่อหน่วย</th><th>รวม</th></tr></thead><tbody>${rows}<tr><td colspan="4" class="right"><b>รวมทั้งสิ้น</b></td><td><b>${baht(d.amount)}</b></td></tr></tbody></table><p>เห็นควรดำเนินการโดยวิธีเฉพาะเจาะจงตามระเบียบที่เกี่ยวข้อง</p><div class="sign">ลงชื่อ ........................................ เจ้าหน้าที่พัสดุ<br>วันที่พิมพ์ ${new Date().toLocaleDateString('th-TH')}</div></body></html>`; let w=open('','_blank'); w.document.write(html); w.document.close()}
function printReport(){let list=filtered(),total=list.reduce((a,d)=>a+d.amount,0);let rows=list.map((d,i)=>`<tr><td>${i+1}</td><td>${d.number}</td><td>${thaiDate(d.date)}</td><td>${d.subject}</td><td>${d.type==='buy'?'จัดซื้อ':'จัดจ้าง'}</td><td>${d.group}</td><td>${baht(d.amount)}</td><td>${labels[d.status]}</td></tr>`).join('');let html=`<html><head><title>รายงานสรุป</title><style>body{font-family:Sarabun,Arial,sans-serif;padding:36px}h1,h2{text-align:center}table{width:100%;border-collapse:collapse}td,th{border:1px solid #111;padding:7px;font-size:14px}.right{text-align:right}@media print{button{display:none}}</style></head><body><button onclick="print()">พิมพ์ / บันทึก PDF</button><h1>รายงานสรุปการจัดซื้อจัดจ้าง วิธีเฉพาะเจาะจง</h1><h2>${S.org} · ปีงบประมาณ ${S.year}</h2><table><thead><tr><th>ลำดับ</th><th>เลขที่</th><th>วันที่</th><th>เรื่อง</th><th>ประเภท</th><th>กลุ่มสาระ/งาน</th><th>วงเงิน</th><th>สถานะ</th></tr></thead><tbody>${rows}<tr><td colspan="6" class="right"><b>รวมทั้งสิ้น</b></td><td><b>${baht(total)}</b></td><td></td></tr></tbody></table><p class="right">ลงชื่อ ........................................ เจ้าหน้าที่พัสดุ<br>วันที่พิมพ์ ${new Date().toLocaleDateString('th-TH')}</p></body></html>`;let w=open('','_blank');w.document.write(html);w.document.close()}
function exportCSV(){let rows=[['เลขที่','วันที่','เรื่อง','ประเภท','กลุ่มงาน','ผู้ขาย','วงเงิน','สถานะ'],...filtered().map(d=>[d.number,d.date,d.subject,d.type==='buy'?'จัดซื้อ':'จัดจ้าง',d.group,d.vendor,d.amount,labels[d.status]])]; let csv='\ufeff'+rows.map(r=>r.map(x=>'"'+String(x).replaceAll('"','""')+'"').join(',')).join('\n'); let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='sps-rtafnc-report.csv';a.click()}
function render(){if(!S.user)return loginPage(); if(S.view==='dashboard')dashboard(); else if(S.view==='requests')requests(); else if(S.view==='create')create(); else if(S.view==='vendors')vendors(); else if(S.view==='reports')reports(); else if(S.view==='logs')logs(); else if(S.view==='settings')settings(); else dashboard()} render();
</script>
</body>
</html>
